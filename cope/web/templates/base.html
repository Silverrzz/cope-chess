<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}COPE Chess{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <script src="{{ url_for('static', path='script.js') }}" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/tournaments">COPE Chess</a>
      <nav>
        <a class="{% if active_nav == 'tournaments' %}active{% endif %}" href="/tournaments">Tournaments</a>
      </nav>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
