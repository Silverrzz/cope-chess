x-cope-service: &cope-service
  build:
    context: .
    args:
      COPE_DEPLOY_COMMIT: ${COPE_DEPLOY_COMMIT:?Set COPE_DEPLOY_COMMIT to the checked-out commit}
  image: cope-chess:${COPE_DEPLOY_COMMIT}
  restart: unless-stopped
  environment: &cope-environment
    COPE_DATABASE_URL: postgresql://cope@db:5432/cope
    COPE_DATABASE_PASSWORD_FILE: /run/secrets/cope_db_password
    COPE_DATABASE_POOL_MIN: "2"
    COPE_DATABASE_POOL_MAX: "50"
    COPE_DEPLOY_COMMIT: ${COPE_DEPLOY_COMMIT}
    COPE_ADMIN_TOKEN_FILE: /run/secrets/cope_admin_token
    COPE_WEB_EVENT_TOKEN_FILE: /run/secrets/cope_event_token
    COPE_WEB_STREAM_URL: ws://web:8701/internal/stream
    COPE_WORKER_SERVER_URL: wss://${COPE_DOMAIN:?Set COPE_DOMAIN}/worker
    COPE_OPENING_IMPORT_MAX_BYTES: ${COPE_OPENING_IMPORT_MAX_BYTES:-67108864}
  secrets:
    - cope_admin_token
    - cope_event_token
    - cope_db_password
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "5"

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cope
      POSTGRES_USER: cope
      POSTGRES_PASSWORD_FILE: /run/secrets/cope_db_password
      POSTGRES_INITDB_ARGS: --data-checksums
    secrets:
      - cope_db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_connections=${COPE_POSTGRES_MAX_CONNECTIONS:-300}
      - -c
      - shared_buffers=${COPE_POSTGRES_SHARED_BUFFERS:-512MB}
      - -c
      - effective_cache_size=${COPE_POSTGRES_EFFECTIVE_CACHE_SIZE:-2GB}
      - -c
      - wal_compression=on
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=${COPE_POSTGRES_MAX_WAL_SIZE:-4GB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cope -d cope"]
      interval: 5s
      timeout: 5s
      retries: 20
    stop_grace_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  migrate:
    <<: *cope-service
    restart: "no"
    command: ["db", "migrate"]
    depends_on:
      db:
        condition: service_healthy

  web:
    <<: *cope-service
    command: ["web", "--host", "0.0.0.0", "--port", "8701"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8701/health/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  scheduler:
    <<: *cope-service
    command: ["scheduler"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      web:
        condition: service_healthy

  worker-server:
    <<: *cope-service
    environment:
      <<: *cope-environment
      COPE_DATABASE_POOL_MAX: "150"
    command:
      - worker-server
      - --worker-host
      - 0.0.0.0
      - --worker-port
      - "8702"
      - --poll-interval-s
      - "10"
      - --presence-flush-interval-s
      - "15"
      - --dependency-probe-interval-s
      - "300"
      - --game-threads
      - ${COPE_WORKER_GAME_THREADS:-2048}
    depends_on:
      migrate:
        condition: service_completed_successfully
      web:
        condition: service_healthy

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      COPE_DOMAIN: ${COPE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy
      worker-server:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  backup:
    <<: *cope-service
    profiles: ["operations"]
    restart: "no"
    working_dir: /backups
    command: ["db", "backup", "--keep", "7"]
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

secrets:
  cope_admin_token:
    file: ./secrets/admin_token
  cope_event_token:
    file: ./secrets/event_token
  cope_db_password:
    file: ./secrets/db_password

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
